name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Support floor (package.json "engines") and the local/dev LTS (mise.toml).
        node-version: [22, 24]
    steps:
      # Actions pinned to full commit SHAs (supply-chain hardening); Dependabot
      # bumps both the SHA and the version comment.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run lint:filelength
      - run: npm run test:coverage # enforces 100% coverage on src/ (vitest.config thresholds)
      - run: npm run build
      - run: npm run check:pkg
      - run: node scripts/smoke-dist.mjs # exercise the compiled dist/ a consumer imports
