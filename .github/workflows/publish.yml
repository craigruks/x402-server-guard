name: Publish

# Publish to npm when a GitHub Release is published. Cut the release from a version
# tag (vX.Y.Z) that matches package.json (see `just release`). This workflow verifies
# the tag matches, runs the full gate, and publishes with provenance. Publishing uses
# npm trusted publishing (OIDC): no long-lived NPM token. Configure the trusted
# publisher for this repo and this workflow file on npmjs.org before the first release.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC) + provenance; no NPM_TOKEN

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to full commit SHAs (supply-chain hardening); Dependabot
      # bumps both the SHA and the version comment.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing (OIDC) requires npm >= 11.5.1; setup-node ships older.
      - run: npm install -g npm@latest
      - run: npm ci
      # The release tag must match the version being published, or a stale or wrong
      # tag would ship the wrong version.
      - name: Verify the release tag matches package.json
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG="${{ github.event.release.tag_name }}"
          if [ "$TAG" != "v$PKG_VERSION" ]; then
            echo "Release tag $TAG does not match package.json version v$PKG_VERSION" >&2
            exit 1
          fi
      - run: npm run check
      # prepublishOnly runs build + check:pkg; access and provenance come from
      # package.json publishConfig.
      - run: npm publish
